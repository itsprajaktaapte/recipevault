
services:
  backend:
    build: ./backend
    container_name: recipevault-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  frontend:
    build: ./frontend
    container_name: recipevault-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000